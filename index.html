<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diors Adventure</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
      text-align:center;
    }

    .hero{
      padding:60px 20px;
      background:red;
    }

    h1{
      font-size:40px;
      margin-bottom:10px;
    }

    p{
      font-size:18px;
    }

    .btn{
      display:inline-block;
      margin-top:20px;
      padding:12px 25px;
      background:white;
      color:red;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }

    .section{
      padding:40px 20px;
    }

    .card{
      background:#222;
      margin:15px;
      padding:20px;
      border-radius:15px;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>DIORS ADVENTURE</h1>
    <p>Rafting • Offroad • ATV • Camping</p>

    <a class="btn" href="https://wa.me/628123456789">
      Booking Sekarang
    </a>
  </div>

  <div class="section">

    <div class="card">
      <h2>Rafting</h2>
      <p>Seru bareng tim dan anti boring.</p>
    </div>

    <div class="card">
      <h2>Offroad Jimny</h2>
      <p>Gas lumpur dan tanjakan.</p>
    </div>

    <div class="card">
      <h2>ATV Adventure</h2>
      <p>Track hutan dan jalur ekstrem.</p>
    </div>

  </div>

</body>
</html>
